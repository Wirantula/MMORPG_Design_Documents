services:
  postgres:
    image: postgres:16
    container_name: cybaworld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybaworld}
      POSTGRES_USER: ${POSTGRES_USER:-cybaworld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cybaworld_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cybaworld-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
