# CybaWorld Production Docker Compose
# Usage: docker compose -f infra/compose/docker-compose.prod.yml --env-file infra/env/.env.prod up -d

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: cybaworld-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cybaworld

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: cybaworld-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cybaworld

  # ── Game Server (API + WebSocket) ──────────────────────────
  server:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: cybaworld-prod-server
    restart: unless-stopped
    env_file:
      - ../env/.env.prod
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${SERVER_PORT:-1545}/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - cybaworld

  # ── Worker (tick scheduler + AI proposal jobs) ─────────────
  worker:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: cybaworld-prod-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - ../env/.env.prod
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"setTimeout(()=>process.exit(0),50)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - cybaworld

  # ── Web Frontend (Next.js) ─────────────────────────────────
  web:
    build:
      context: ../../client
      dockerfile: Dockerfile
    container_name: cybaworld-prod-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cybaworld

  # ── Caddy Reverse Proxy (TLS termination) ──────────────────
  caddy:
    image: caddy:2
    container_name: cybaworld-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cybaworld

volumes:
  postgres_data:
    name: cybaworld_prod_postgres_data
  redis_data:
    name: cybaworld_prod_redis_data
  caddy_data:
    name: cybaworld_prod_caddy_data
  caddy_config:
    name: cybaworld_prod_caddy_config

networks:
  cybaworld:
    name: cybaworld_prod
    driver: bridge
